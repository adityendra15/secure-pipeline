name: Automated Secure Deployment Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io

jobs:
  build-scan-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Check out source code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: pip install -r requirements-dev.txt

      - name: Test the application
        run: pytest -q

      - name: Calculate immutable image name
        id: image
        shell: bash
        run: |
          REPOSITORY_LOWERCASE="${GITHUB_REPOSITORY,,}"
          IMAGE_REF="${REGISTRY}/${REPOSITORY_LOWERCASE}:${GITHUB_SHA}"
          echo "ref=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_REF=${IMAGE_REF}" >> "$GITHUB_ENV"

      - name: Build Docker image
        run: |
          docker build \
            --label "org.opencontainers.image.source=${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}" \
            -t "$IMAGE_REF" .

      - name: Block images with fixable critical vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL"

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ steps.image.outputs.ref }}
          format: cyclonedx
          output: sbom.cdx.json
          exit-code: "0"

      - name: Upload SBOM artifact
        uses: actions/upload-artifact@v4
        with:
          name: software-bill-of-materials
          path: sbom.cdx.json
          retention-days: 14

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push approved image to registry
        run: docker push "$IMAGE_REF"

      - name: Install Kind
        run: |
          curl -Lo kind https://kind.sigs.k8s.io/dl/v0.31.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      - name: Create temporary Kubernetes cluster
        run: kind create cluster --name secure-pipeline --config kind-config.yaml

      - name: Load exact registry image into cluster
        run: kind load docker-image "$IMAGE_REF" --name secure-pipeline

      - name: Render Kubernetes Deployment
        run: |
          sed \
            -e "s|IMAGE_PLACEHOLDER|$IMAGE_REF|g" \
            -e "s|VERSION_PLACEHOLDER|$GITHUB_SHA|g" \
            kubernetes/deployment.yaml > rendered-deployment.yaml

      - name: Deploy to Kubernetes automatically
        run: |
          kubectl apply -f rendered-deployment.yaml
          kubectl apply -f kubernetes/service.yaml

      - name: Validate Kubernetes rollout
        run: |
          kubectl rollout status deployment/secure-pipeline --timeout=120s
          kubectl get pods -l app=secure-pipeline

      - name: Validate live and ready endpoints
        run: |
          kubectl port-forward service/secure-pipeline 8080:80 > /tmp/port-forward.log 2>&1 &
          PORT_FORWARD_PID=$!
          trap 'kill $PORT_FORWARD_PID 2>/dev/null || true' EXIT
          sleep 5
          curl --fail --retry 5 --retry-delay 2 http://127.0.0.1:8080/health/live
          curl --fail --retry 5 --retry-delay 2 http://127.0.0.1:8080/health/ready

      - name: Demonstrate self-healing
        run: |
          OLD_POD="$(kubectl get pods -l app=secure-pipeline -o jsonpath='{.items[0].metadata.name}')"
          kubectl delete pod "$OLD_POD"

          for ATTEMPT in $(seq 1 60); do
            READY_COUNT="$(kubectl get pods -l app=secure-pipeline -o jsonpath='{range .items[*]}{.status.containerStatuses[0].ready}{"\\n"}{end}' 2>/dev/null | grep -c true || true)"
            if [ "$READY_COUNT" -eq 2 ]; then
              echo "Kubernetes restored two ready replicas."
              break
            fi
            sleep 2
          done

          test "$READY_COUNT" -eq 2
          kubectl get pods -l app=secure-pipeline

      - name: Demonstrate zero-downtime rolling update
        run: |
          kubectl run traffic-test \
            --image=curlimages/curl:8.10.1 \
            --restart=Never \
            --command -- sh -c '
              failed=0
              i=1
              while [ "$i" -le 25 ]; do
                if curl -fsS http://secure-pipeline/health/ready >/dev/null; then
                  echo "request-$i OK"
                else
                  echo "request-$i FAILED"
                  failed=1
                fi
                i=$((i + 1))
                sleep 0.4
              done
              exit "$failed"
            '

          sleep 2
          kubectl set env deployment/secure-pipeline DEMO_RELEASE="$GITHUB_RUN_ID"
          kubectl rollout status deployment/secure-pipeline --timeout=120s

          kubectl wait --for=jsonpath='{.status.phase}'=Succeeded pod/traffic-test --timeout=120s || {
            kubectl logs traffic-test || true
            exit 1
          }
          kubectl logs traffic-test
