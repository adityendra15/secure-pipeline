name: Automated Secure Website Deployment Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  CLUSTER_NAME: secure-pipeline
  NAMESPACE: secure-pipeline

jobs:
  build-scan-push-deploy:
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install test dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-dev.txt

      - name: Run unit tests
        run: python -m pytest --quiet

      - name: Define immutable image name
        shell: bash
        run: |
          image_name="${REGISTRY}/${GITHUB_REPOSITORY,,}:${GITHUB_SHA}"
          echo "IMAGE=${image_name}" >> "${GITHUB_ENV}"
          echo "Image: ${image_name}"

      - name: Build Docker image
        run: docker build --tag "${IMAGE}" .

      - name: Create vulnerability report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          scan-type: image
          format: json
          output: trivy-vulnerability-report.json
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "0"

      - name: Generate CycloneDX SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          scan-type: image
          format: cyclonedx
          output: sbom.cyclonedx.json
          skip-setup-trivy: true

      - name: Upload security reports
        uses: actions/upload-artifact@v7
        with:
          name: security-reports-${{ github.sha }}
          path: |
            trivy-vulnerability-report.json
            sbom.cyclonedx.json
          if-no-files-found: error
          retention-days: 30

      - name: Enforce vulnerability gate before push
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE }}
          scan-type: image
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          skip-setup-trivy: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push immutable image
        run: docker push "${IMAGE}"

      - name: Create temporary Kubernetes cluster
        uses: helm/kind-action@v1.14.0
        with:
          version: v0.31.0
          cluster_name: ${{ env.CLUSTER_NAME }}
          config: kind-config.yaml
          wait: 120s

      - name: Load the built image into Kind
        run: kind load docker-image "${IMAGE}" --name "${CLUSTER_NAME}"

      - name: Deploy application to Kubernetes
        run: |
          kubectl apply -f kubernetes/namespace.yaml
          kubectl apply -f kubernetes/service.yaml
          bash scripts/render-manifest.sh "${IMAGE}" "${GITHUB_SHA}" | kubectl apply -f -
          kubectl rollout status deployment/secure-pipeline-app \
            --namespace "${NAMESPACE}" \
            --timeout=180s

      - name: Validate application health
        run: bash scripts/smoke-test.sh

      - name: Demonstrate Kubernetes self-healing
        run: bash scripts/demo-self-healing.sh

      - name: Demonstrate availability during rolling update
        env:
          NEW_VERSION: rollout-${{ github.run_id }}-${{ github.run_attempt }}
        run: bash scripts/demo-zero-downtime.sh

      - name: Show final Kubernetes state
        if: always()
        run: |
          kubectl get deployments,pods,services --namespace "${NAMESPACE}" --output wide || true
          kubectl describe deployment secure-pipeline-app --namespace "${NAMESPACE}" || true
