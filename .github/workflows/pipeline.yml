name: Automated Secure Website Deployment Pipeline

on:
  push:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-scan-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Download repository code
        uses: actions/checkout@v6

      - name: Create image name
        id: image
        shell: bash
        run: |
          IMAGE_REPOSITORY="ghcr.io/${GITHUB_REPOSITORY,,}"
          IMAGE_WITH_TAG="${IMAGE_REPOSITORY}:${GITHUB_SHA}"
          echo "full_name=${IMAGE_WITH_TAG}" >> "$GITHUB_OUTPUT"

      - name: Build Docker image
        shell: bash
        run: |
          docker build \
            --tag "${{ steps.image.outputs.full_name }}" \
            --tag secure-pipeline-app:local \
            .

      - name: Test the container health endpoint
        shell: bash
        run: |
          docker run --detach \
            --name secure-pipeline-test \
            --publish 8080:8080 \
            secure-pipeline-app:local

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8080/healthz; then
              docker rm --force secure-pipeline-test
              exit 0
            fi
            sleep 1
          done

          docker logs secure-pipeline-test
          docker rm --force secure-pipeline-test
          exit 1

      - name: Scan image for vulnerabilities
        shell: bash
        run: |
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.72.0 image \
            --severity HIGH,CRITICAL \
            --ignore-unfixed \
            --exit-code 0 \
            "${{ steps.image.outputs.full_name }}"

      - name: Generate CycloneDX SBOM
        shell: bash
        run: |
          docker run --rm \
            --volume /var/run/docker.sock:/var/run/docker.sock \
            --volume "$PWD:/workspace" \
            aquasec/trivy:0.72.0 image \
            --format cyclonedx \
            --output /workspace/sbom.cdx.json \
            "${{ steps.image.outputs.full_name }}"

      - name: Save SBOM as a workflow artifact
        uses: actions/upload-artifact@v6
        with:
          name: sbom-${{ github.sha }}
          path: sbom.cdx.json

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image to GitHub Container Registry
        shell: bash
        run: docker push "${{ steps.image.outputs.full_name }}"

      - name: Install kind
        shell: bash
        run: |
          curl --fail --location --output kind \
            https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
          kind version

      - name: Create temporary Kubernetes cluster
        shell: bash
        run: kind create cluster --name secure-pipeline

      - name: Load image into Kubernetes cluster
        shell: bash
        run: |
          kind load docker-image secure-pipeline-app:local \
            --name secure-pipeline

      - name: Deploy application to Kubernetes
        shell: bash
        run: kubectl apply --filename k8s/

      - name: Verify Kubernetes rollout
        shell: bash
        run: |
          kubectl rollout status deployment/secure-pipeline --timeout=120s
          kubectl get deployments,pods,services

      - name: Test the deployed application
        shell: bash
        run: |
          kubectl port-forward service/secure-pipeline-service 8081:80 \
            > /tmp/port-forward.log 2>&1 &
          PORT_FORWARD_PID=$!

          for attempt in {1..20}; do
            if curl --fail --silent http://127.0.0.1:8081/healthz; then
              kill "$PORT_FORWARD_PID"
              exit 0
            fi
            sleep 2
          done

          cat /tmp/port-forward.log
          kill "$PORT_FORWARD_PID" || true
          exit 1
